name: Fetch Prices

on:
  schedule:
    - cron: "0,15,30,45 * * * *"   # every 15 min — explicit times, more reliable than */15
  workflow_dispatch:                # manual trigger from GitHub UI
  push:
    branches: [main]               # run on push to keep workflow "active" (prevents GitHub disabling it)

jobs:
  fetch:
    name: Fetch & Store Prices
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests python-dotenv supabase

      - name: Run fetch_prices.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pricewatch_v4/fetch_prices.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::fetch_prices.py failed — check Supabase connectivity and API sources"